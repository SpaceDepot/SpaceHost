<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Host - Terminal</title>
    <meta name="description" content="SpaceDepot's website.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>

<body>
    <div class="screen-border">


        <div class="terminal-window">
            <div class="terminal-titlebar">
                <span>SPACE_HOST</span>
                <span class="terminal-controls">[ _ ] [ X ]</span>
            </div>

            <div class="terminal-content">


                <div class="main-section">
                    <div class="dashed-box">
                        <div class="box-title">- LATEST USMAP -</div>

                        <div id="status-container" class="status-container loading">
                            <span class="spinner">wait...</span>
                            <p id="status-text">Fetching latest files from repo...</p>
                        </div>

                        <div id="file-info" class="file-info hidden">
                            <h3 id="filename">Looking for file...</h3>
                            <p id="filemeta">SIZE: CALCULATING...</p>

                            <button id="download-btn" class="primary-btn">
                                > DOWNLOAD FILE &lt;
                            </button>
                        </div>

                        <div id="error-container" class="error-container hidden">
                            <p>ERROR 404</p>
                            <p id="error-text">Failed to fetch files. Ensure your config is correct.</p>
                            <button id="retry-btn" class="secondary-btn">> RETRY &lt;</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>&lt;-== DO NOT NUKE THIS ONE PLS ==-&gt;</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
